
services:
  bg-db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - bg-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - syncup-network

  bg-pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@syncup.rocks
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    volumes:
      - ./postgres/pgadmin.json:/pgadmin4/servers.json
    depends_on:
      - bg-db
    deploy:
      resources:
        limits:
          memory: 256M
    profiles:
      - all
    networks:
      - syncup-network

  bg-s3mock:
    container_name: bg-s3mock
    image: adobe/s3mock:latest
    ports:
      - 9090:9090
    environment:
     - COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS=data
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - syncup-network

  bg-mailhog:
    image: mailhog/mailhog
    logging:
      driver: "none"  # 🔇 This kills all logs for this service
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port
    networks:
      - syncup-network

  bg-keycloak:
    build:
      context: .
      dockerfile: ./keycloak/Dockerfile
    #image: quay.io/keycloak/keycloak:latest
    #command: start-dev --import-realm
    environment:
      - KC_HOSTNAME=syncup.local
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_PORT=7080        # CRITICAL: Tells Keycloak to use 7080 in URLs
      - KC_PROXY_HEADERS=xforwarded  # Tells Keycloak to trust Traefik's headers
      - KC_PROXY=edge
      - KC_HTTP_ENABLED=true
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      # Database settings - using Postgres container
      #- KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://bg-db:5432/keycloak
      - KC_DB_USERNAME=myuser
      - KC_DB_PASSWORD=mypassword
      # SMTP settings
      - KC_EMAIL_SMTP_HOST=bg-mailhog
      - KC_EMAIL_SMTP_PORT=1025
      - KC_EMAIL_SMTP_USER=""
      - KC_EMAIL_SMTP_PASSWORD=""
      - KC_EMAIL_FROM=no-reply@local.dev
      - KC_EMAIL_SMTP_FROM_DISPLAY_NAME="Dev Keycloak"
      - KC_EMAIL_SMTP_ENCRYPTION=none
    ports:
      - "8080:8080"
    depends_on:
      bg-mailhog:
        condition: service_started
      bg-db:
        condition: service_healthy
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - syncup-network

  bg-traefik:
    image: traefik:latest
    command:
      - "--api.insecure=true" # Enables dashboard at http://localhost:8080
      - "--providers.docker=false"
      #- "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      #- "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.file.filename=/etc/traefik_dynamic.yml"
    ports:
      - "7080:80"     # Browsing to http://syncup.local:7080
      - "7081:8080"   # Traefik Dashboard for debugging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      #- "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/traefik_dynamic.yml:/etc/traefik_dynamic.yml"
    networks:
      - syncup-network

volumes:
  bg-pgdata:

networks:
  syncup-network:
    driver: bridge
